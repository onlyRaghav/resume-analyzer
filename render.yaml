databases:
  - name: resumeiq-db
    databaseName: resumeiq
    user: resumeiq
    plan: free

services:
  - type: web
    name: resumeiq-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: DJANGO_TIME_ZONE
        value: "UTC"
      - key: DATABASE_URL
        fromDatabase:
          name: resumeiq-db
          property: connectionString
      - key: ANALYSIS_PROVIDER
        value: "placeholder"
      - key: USE_THREAD_QUEUE_FALLBACK
        value: "1"
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "0"
      - key: RESULT_RETENTION_DAYS
        value: "30"
      - key: RATE_LIMIT_PER_HOUR
        value: "10"
      - key: MIN_ANALYSIS_DISPLAY_SECONDS
        value: "8"
